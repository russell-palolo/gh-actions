name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: CustomAction
        uses: ./.github/actions/custom-js-action
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Fetch and Cache Dependencies
        id: fetch
        uses: ./.github/actions/node-modules
        with:
          caching: false
      - name: Cache Status
        run: echo "cache used? ${{ steps.fetch.outputs.used-cache }}"
      - name: Lint
        run: npm run lint
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Fetch and Cache Dependencies
        uses: ./.github/actions/node-modules
      - name: Test
        id: test-step
        run: npm run test
        # if test step fails save the test execution artifact
      - name: Upload test report
        if: failure() && steps.test-step.outcome == 'failure'
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: test.json
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Fetch and Cache Dependencies
        uses: ./.github/actions/node-modules
      - name: Build
        run: npm run build
      - name: Publish JS filename
        id: publish
        # older form ouf set output which is deprecated but exists in palolo code
        # run: find dist/assets/*.js -type f -execdir echo ':output script-file={}' >> $GITHUB_OUTPUT ';'
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
      - name: Store Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    uses: ./.github/workflows/reusable.yaml
    with:
      artifact-name: dist-files
      script-file: ${{ needs.build.outputs.script-file }}
  print-deploy-result:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: print deploy output
        run: echo "${{ needs.deploy.outputs.result }}"
  # if workflow execution fails output github context data
  report:
    needs:
      - deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "something went wrong"
          echo "${{ github }}"

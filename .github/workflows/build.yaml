name: build

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Fetch Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        id: test-step
        run: npm run test
        # if test step fails save the test execution artifact
      - name: Upload test report
        if: failure() && steps.test-step.outcome == 'failure'
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: test.json
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Fetch Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish JS filename
        id: publish
        # older form ouf set output which is deprecated but exists in palolo code
        # run: find dist/assets/*.js -type f -execdir echo ':output script-file={}' >> $GITHUB_OUTPUT ';'
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
      - name: Store Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist-files
      - name: Output Build Artifacts
        run: ls -al
      - name: Output Script File Name
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Deployment
        run: echo "Deploying..."
  report:
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "something went wrong"
          echo "${{ github }}"
